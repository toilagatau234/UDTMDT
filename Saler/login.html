<!DOCTYPE html>
<html lang="vi" ng-app="TokyoLifeSaler">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập Saler</title>
  <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <script src="./app.js"></script>
  <script src="./services/apiService.js"></script>
  <script src="./controllers/loginController.js"></script>
</head>
<body ng-controller="LoginCtrl" class="d-flex align-items-center" style="min-height:100vh;">
  <div class="container" style="max-width:400px;">
    <div class="card p-4 shadow">
      <h4 class="text-center mb-3">Saler Login</h4>
      <div class="mb-3">
        <label>Email</label>
        <input ng-model="email" type="email" class="form-control" placeholder="saler@example.com">
      </div>
      <div class="mb-3">
        <label>Mật khẩu</label>
        <input ng-model="password" type="{{showPassword?'text':'password'}}" class="form-control">
      </div>
      <button class="btn btn-primary w-100" ng-click="login()">Đăng nhập</button>
    </div>
  </div>
</body>
</html>

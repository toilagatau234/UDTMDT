<div class="container py-4" ng-controller="ProductController">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Thêm sản phẩm</h4>
    <a class="btn btn-outline-secondary btn-sm" href="#!/products">← Danh sách</a>
  </div>

  <form class="row g-3" ng-submit="save()">
    <div class="col-md-6">
      <label class="form-label">Tiêu đề</label>
      <input class="form-control" ng-model="form.title" required>
    </div>

    <div class="col-md-3">
      <label class="form-label">Giá</label>
      <input type="number" class="form-control" ng-model="form.price" min="0" required>
    </div>

    <div class="col-md-3">
      <label class="form-label">Tồn kho</label>
      <input type="number" class="form-control" ng-model="form.stock" min="0" required>
    </div>

    <div class="col-12">
      <label class="form-label">Mô tả</label>
      <textarea class="form-control" rows="3" ng-model="form.description" required></textarea>
    </div>

    <div class="col-md-6">
      <label class="form-label">Hình ảnh</label>
      <input type="file" class="form-control" accept="image/*"
             onchange="angular.element(this).scope().onFileChange(this.files)">
      <div class="mt-2" ng-if="previewUrl">
        <img ng-src="{{previewUrl}}" alt="preview" style="max-height:120px; border-radius:8px">
      </div>
    </div>

    <div class="col-12 mt-2">
      <button class="btn btn-primary" type="submit">Thêm</button>
      <a class="btn btn-outline-secondary ms-2" href="#!/products">Hủy</a>
    </div>
  </form>
</div>

<div class="container py-4" ng-controller="ProductController">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Danh sách sản phẩm</h4>
    <a class="btn btn-primary btn-sm" href="#!/product/add">+ Thêm sản phẩm</a>
  </div>

  <table class="table table-striped align-middle">
    <thead>
      <tr>
        <th>Hình</th>
        <th>Tiêu đề</th>
        <th>Giá</th>
        <th>Tồn</th>
        <th style="width:120px;"></th>
      </tr>
    </thead>
    <tbody>
      <tr ng-repeat="p in products">
        <td>
          <img ng-if="p.imageUrl" ng-src="{{p.imageUrl}}" alt="" style="height:48px; border-radius:8px">
          <span ng-if="!p.imageUrl" class="text-muted">—</span>
        </td>
        <td>{{p.title}}</td>
        <td>{{p.price | currency:'₫'}}</td>
        <td>{{p.stock}}</td>
        <td class="text-end">
          <button class="btn btn-sm btn-outline-danger" ng-click="remove(p)">Xóa</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

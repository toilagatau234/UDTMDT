<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>{{ isAdd ? 'Thêm sản phẩm' : 'Cập nhật sản phẩm' }}</h4>
    <a class="btn btn-outline-secondary btn-sm" href="#!/product/add">Tạo mới</a>
  </div>

  <form class="row g-3 mb-4" ng-submit="save()">
  <div class="col-md-4">
    <label class="form-label">Tên sản phẩm</label>
    <input class="form-control" ng-model="form.title"> required>
  </div>
  <div class="col-md-3">
    <label class="form-label">Giá</label>
    <input type="number" class="form-control" ng-model="form.price" min="0" required>
  </div>
  <div class="col-md-3">
    <label class="form-label">Tồn kho</label>
    <input type="number" class="form-control" ng-model="form.stock" min="0" required>
  </div>

  <div class="col-md-6">
    <label class="form-label">Hình ảnh</label>
    <input type="file" class="form-control" accept="image/*"
          onchange="angular.element(this).scope().onFileChange(this.files)">
    <div class="mt-2" ng-if="previewUrl">
      <img ng-src="{{previewUrl}}" alt="preview" style="max-height:120px">
    </div>
  </div>

  <div class="col-md-2 d-flex align-items-end">
    <button class="btn btn-primary w-100" type="submit">{{ isAdd ? 'Thêm' : 'Lưu' }}</button>
  </div>
</form>


  <h5 class="mb-2">Danh sách sản phẩm</h5>
  <table class="table table-striped align-middle">
    <thead>
      <tr>
        <th>Tên</th>
        <th>Giá</th>
        <th>Tồn</th>
        <th style="width:140px;"></th>
      </tr>
    </thead>
    <tbody>
      <tr ng-repeat="p in products">
        <td>{{p.name}}</td>
        <td>{{p.price | number}} ₫</td>
        <td>{{p.stock}}</td>
        <td class="text-end">
          <button class="btn btn-sm btn-outline-secondary me-1" ng-click="editRow(p)">Sửa</button>
          <button class="btn btn-sm btn-outline-danger" ng-click="remove(p)">Xóa</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
